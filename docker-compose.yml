services:
  firebase:
    build:
      context: .
      target: emulators
    ports:
      - "4000:4000"   # Emulator UI  →  http://localhost:4000
      - "9099:9099"   # Auth emulator
      - "8080:8080"   # Firestore emulator
      - "5001:5001"   # Functions emulator
    volumes:
      - emulator-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      target: web-dev
    ports:
      - "5173:5173"   # Vite dev server  →  http://localhost:5173
    volumes:
      - .:/app                  # source code (hot-reload)
      - /app/node_modules       # preserve node_modules from image
    environment:
      # Firebase — defaults match the demo project used by emulators.
      # Override by setting these in your shell or a .env file.
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-demo-key}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-demo-ezpeople.firebaseapp.com}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-demo-ezpeople}
      VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-demo-ezpeople.appspot.com}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-000000000000}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-1:000000000000:web:demo00000000}
      VITE_LIFF_ID: ${VITE_LIFF_ID:-}
      # Functions emulator endpoint (browser connects to localhost, not the Docker service name)
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5001/demo-ezpeople/asia-southeast1}
    depends_on:
      - firebase

volumes:
  emulator-data:
